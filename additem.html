<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Add Item</title>
  <link rel="stylesheet" href="admin.css">
</head>
<body>

<nav class="a-nav">
  <a href="admin.html" class="a-logo">FoodStop <span>Admin Panel</span></a>
  <div class="a-nav-links">
    <a href="additem.html" class="active">Add Item</a>
    <a href="items.html">Manage Items</a>
    <a href="admin.html" onclick="doLogout()">Logout</a>
  </div>
</nav>

<div class="a-wrap">
  <h1>Add New Item</h1>
  <p class="sub">Add a new food item to the menu</p>

  <div class="a-form">
    <div id="div1"></div>

    <label>Food Name</label>
    <input type="text" id="inp1" placeholder="e.g. Chicken Biryani">

    <label>Price (₹)</label>
    <input type="number" id="inp2" placeholder="e.g. 180">

    <label>Category</label>
    <select id="inp3">
      <option value="">Select category</option>
      <option value="Fast Food">Fast Food</option>
      <option value="Indian">Indian</option>
      <option value="Chinese">Chinese</option>
      <option value="Italian">Italian</option>
      <option value="Dessert">Dessert</option>
      <option value="Drinks">Drinks</option>
    </select>

    <button class="a-btn yellow" onclick="addItem()">Add to Menu</button>
  </div>
</div>

<script src="data.js"></script>
<script src="admin.js"></script>

</body>
</html>
